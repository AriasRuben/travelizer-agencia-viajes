<h1>Reserva de alojamientos</h1>
 
<p>Para reservar alojamientos, debe seleccionar al menos 1 adulto, seleccionar una fecha de entrada, 
	hacer clic sobre el botón reserva de entradas y seleccionar el tipo de alojamiento que desea. Por último, debe seleccionar el número de noches
	que se va a alojar.	 
</p>
